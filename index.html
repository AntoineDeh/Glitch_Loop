<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0014" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GLITCH LOOP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>
    <section id="screen-title" class="screen visible">
      <h1 class="title">GLITCH<span>LOOP</span></h1>
      <p class="subtitle">tap to jump — survive the glitches</p>
      <p class="best">BEST: <span id="best-title">0</span></p>
      <button id="btn-play" class="btn-primary">PLAY</button>
      <p class="footer-hint">tap anywhere to jump</p>
    </section>
    <section id="screen-hud" class="screen overlay">
      <div id="score" class="score">0</div>
      <div id="glitch-banner" class="glitch-banner"></div>
      <div id="glitch-overlay" class="glitch-overlay"></div>
    </section>
    <section id="screen-gameover" class="screen">
      <h2 class="gameover-title">GAME OVER</h2>
      <p class="result">SCORE <span id="final-score">0</span></p>
      <p class="result small">BEST <span id="final-best">0</span></p>
      <button id="btn-restart" class="btn-primary">RESTART</button>
      <button id="btn-menu" class="btn-secondary">MENU</button>
    </section>
  </div>
  <script src="js/glitches.js"></script>
  <script src="js/player.js"></script>
  <script src="js/obstacles.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
